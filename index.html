<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Albums">
<title>Albums</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1e;
    --border: rgba(255,255,255,0.08);
    --text: #f5f5f5;
    --muted: #888;
    --accent: #ff6b35;
    --accent2: #ff9a6c;
    --green: #30d158;
    --green-dim: rgba(48,209,88,0.15);
    --radius: 14px;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    padding: calc(var(--safe-top) + 12px) 16px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .app-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .count-badge {
    font-size: 13px;
    color: var(--muted);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
  }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .search-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 10px 36px 10px 12px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    direction: rtl;
  }
  .search-input::placeholder { color: var(--muted); }

  /* Filter tabs */
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Sort bar */
  .sort-bar {
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .sort-label { font-size: 12px; color: var(--muted); }
  .sort-btn {
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
  }
  .sort-btn.active { color: var(--accent); background: rgba(255,107,53,0.1); }

  /* Album list */
  .list { padding: 0 16px 32px; }
  
  /* Section header (letter) */
  .section-header {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    padding: 20px 0 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .section-header:first-child { padding-top: 8px; }

  /* Album card */
  .album-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.15s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .album-card:active { transform: scale(0.98); opacity: 0.85; }
  .album-card.purchased {
    background: var(--surface2);
    opacity: 0.5;
  }
  .album-card.purchased .album-title,
  .album-card.purchased .album-artist { text-decoration: line-through; }

  /* Vinyl icon */
  .vinyl-icon {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #2a2a2a, #3d3d3d 30%, #2a2a2a 60%, #3d3d3d 90%, #2a2a2a);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
  }
  .vinyl-icon::after {
    content: '';
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--bg);
    border: 1.5px solid rgba(255,255,255,0.1);
  }
  .vinyl-icon.purchased {
    background: conic-gradient(from 0deg, var(--green), rgba(48,209,88,0.3) 50%, var(--green));
  }
  .vinyl-initial {
    position: absolute;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    top: 4px;
    right: 4px;
  }

  .album-info { flex: 1; min-width: 0; }
  .album-artist {
    font-size: 15px;
    color: var(--accent2);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .album-title {
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  /* Actions */
  .card-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .action-btn {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    border: 0.5px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .action-btn:active { transform: scale(0.9); }
  .action-btn.check { color: var(--green); border-color: rgba(48,209,88,0.3); background: var(--green-dim); }
  .action-btn.del { color: #ff453a; border-color: rgba(255,69,58,0.3); background: rgba(255,69,58,0.1); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-text { font-size: 16px; }

  /* Letter index bar */
  .index-bar {
    overflow-x: auto;
    scrollbar-width: none;
    white-space: nowrap;
    padding: 6px 16px 10px;
    border-bottom: 0.5px solid var(--border);
  }
  .index-bar::-webkit-scrollbar { display: none; }
  .index-letter {
    display: inline-block;
    min-width: 28px;
    height: 28px;
    line-height: 28px;
    text-align: center;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.12s;
    margin-left: 2px;
  }
  .index-letter:active, .index-letter:hover {
    background: var(--accent);
    color: #fff;
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 24px);
    left: 24px;
    width: 56px;
    height: 56px;
    border-radius: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(255,107,53,0.4);
    transition: transform 0.15s;
    z-index: 200;
  }
  .fab:active { transform: scale(0.92); }

  /* Modal (shared base) */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    width: 100%;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 20px 20px calc(var(--safe-bottom) + 20px);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 36px;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    margin: 0 auto 20px;
  }
  .modal-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
    text-align: center;
  }
  .modal-input {
    width: 100%;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
    direction: rtl;
    font-family: inherit;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-input::placeholder { color: var(--muted); }
  .modal-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    margin-bottom: 8px;
  }
  .modal-btn:active { opacity: 0.85; }
  .modal-btn.cancel {
    background: var(--surface2);
    color: var(--muted);
  }
  .modal-btn.danger {
    background: rgba(255,69,58,0.85);
  }

  .icon-btn {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 5px 10px;
    font-size: 16px;
    cursor: pointer;
    color: var(--text);
    line-height: 1;
  }
  .icon-btn:active { opacity: 0.7; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 8px;
    padding: 8px 16px;
  }
  .stat-chip {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
  }
  .stat-chip.total { color: var(--text); background: var(--surface2); }
  .stat-chip.bought { color: var(--green); background: var(--green-dim); }
  .stat-chip.remaining { color: var(--accent); background: rgba(255,107,53,0.1); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="app-title">Albums 🎵</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="icon-btn" id="export-btn" title="ייצוא גיבוי">⬆️</button>
      <label class="icon-btn" id="import-label" title="ייבוא גיבוי">⬇️<input type="file" id="import-input" accept=".json" style="display:none"></label>
      <span class="count-badge" id="count-badge">130 אלבומים</span>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="search" id="search" placeholder="חיפוש אמן או אלבום...">
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">הכול</button>
    <button class="filter-btn" data-filter="heb">עברית</button>
    <button class="filter-btn" data-filter="eng">אנגלית</button>
  </div>
</div>

<div class="index-bar" id="index-bar"></div>

<div class="stats-bar">
  <span class="stat-chip total" id="stat-total">סה"כ: 130</span>
</div>

<div class="list" id="list"></div>

<button class="fab" id="fab-btn" title="הוסף אלבום">+</button>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">הוסף אלבום</div>
    <input class="modal-input" id="input-artist" placeholder="שם אמן" type="text" autocomplete="off">
    <input class="modal-input" id="input-album" placeholder="שם אלבום" type="text" autocomplete="off">
    <button class="modal-btn" id="save-btn">הוסף לרשימה</button>
    <button class="modal-btn cancel" id="cancel-add-btn">ביטול</button>
  </div>
</div>

<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="delete-modal-title">למחוק את האלבום?</div>
    <button class="modal-btn danger" id="confirm-delete-btn">מחק</button>
    <button class="modal-btn cancel" id="cancel-delete-btn">ביטול</button>
  </div>
</div>

<script>
const INITIAL_ALBUMS = [

const STORAGE_KEY = 'albums_v3';

function load() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return INITIAL_ALBUMS.map(([artist, album], i) => ({
    id: i + 1, artist, album, purchased: false
  }));
}

function save(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

let albums = load();
let nextId = Math.max(0, ...albums.map(a => a.id)) + 1;
let filter = 'all';
let search = '';
let pendingDeleteId = null;

function isHebrew(str) {
  return /[\u0590-\u05FF]/.test(str);
}

function sortKey(a) {
  return a.artist.trim();
}

function getLetter(a) {
  const key = sortKey(a);
  return isHebrew(key) ? key[0] : key[0].toUpperCase();
}

function filtered() {
  let list = albums.slice();
  if (filter === 'pending') list = list.filter(a => !a.purchased);
  else if (filter === 'purchased') list = list.filter(a => a.purchased);
  else if (filter === 'heb') list = list.filter(a => isHebrew(a.artist));
  else if (filter === 'eng') list = list.filter(a => !isHebrew(a.artist));

  if (search.trim()) {
    const q = search.trim().toLowerCase();
    list = list.filter(a =>
      a.artist.toLowerCase().includes(q) || a.album.toLowerCase().includes(q)
    );
  }
  list.sort((a, b) => sortKey(a).localeCompare(sortKey(b), undefined, {sensitivity: 'base'}));
  return list;
}

function grouped(list) {
  const groups = {};
  for (const a of list) {
    const letter = getLetter(a);
    if (!groups[letter]) groups[letter] = [];
    groups[letter].push(a);
  }
  return groups;
}

function sortedLetters(g) {
  const heb = [], eng = [];
  for (const l of Object.keys(g)) {
    if (isHebrew(l)) heb.push(l); else eng.push(l);
  }
  eng.sort();
  heb.sort((a,b) => a.localeCompare(b, 'he'));
  return [...eng, ...heb];
}

function renderIndexBar(letters) {
  const bar = document.getElementById('index-bar');
  bar.innerHTML = letters.map(l =>
    `<span class="index-letter" data-letter="${l}">${l}</span>`
  ).join('');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const list = filtered();
  const g = grouped(list);
  const letters = sortedLetters(g);
  const container = document.getElementById('list');

  document.getElementById('stat-total').textContent = `סה"כ: ${albums.length}`;
  document.getElementById('count-badge').textContent = `${list.length} אלבומים`;

  renderIndexBar(search.trim() ? [] : letters);

  if (list.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🎵</div><div class="empty-text">לא נמצאו אלבומים</div></div>`;
    return;
  }

  let html = '';
  for (const letter of letters) {
    html += `<div class="section-header" id="section-${letter}">${letter}</div>`;
    for (const a of g[letter]) {
      const initials = a.artist.trim()[0];
      html += `
        <div class="album-card" data-id="${a.id}">
          <div class="vinyl-icon">
            <span class="vinyl-initial">${initials}</span>
          </div>
          <div class="album-info">
            <div class="album-artist">${escHtml(a.artist)}</div>
            <div class="album-title">${escHtml(a.album)}</div>
          </div>
          <div class="card-actions">
            <button class="action-btn del" data-id="${a.id}" data-action="delete" title="מחק">×</button>
          </div>
        </div>`;
    }
  }
  container.innerHTML = html;
}

// Click on list (toggle / delete)
document.getElementById('list').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const id = +btn.dataset.id;
  if (btn.dataset.action === 'delete') {
    const album = albums.find(a => a.id === id);
    if (!album) return;
    pendingDeleteId = id;
    document.getElementById('delete-modal-title').textContent =
      `למחוק "${album.artist} – ${album.album}"?`;
    document.getElementById('delete-modal').classList.add('open');
  }
});

// Delete modal buttons
document.getElementById('confirm-delete-btn').addEventListener('click', () => {
  if (pendingDeleteId !== null) {
    albums = albums.filter(a => a.id !== pendingDeleteId);
    save(albums);
    pendingDeleteId = null;
    render();
  }
  document.getElementById('delete-modal').classList.remove('open');
});
document.getElementById('cancel-delete-btn').addEventListener('click', () => {
  pendingDeleteId = null;
  document.getElementById('delete-modal').classList.remove('open');
});
document.getElementById('delete-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('delete-modal')) {
    pendingDeleteId = null;
    document.getElementById('delete-modal').classList.remove('open');
  }
});

// Search
document.getElementById('search').addEventListener('input', e => {
  search = e.target.value;
  render();
});

// Filters
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  filter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  render();
});

// Index bar click → scroll to section
document.getElementById('index-bar').addEventListener('click', e => {
  const span = e.target.closest('.index-letter');
  if (!span) return;
  const letter = span.dataset.letter;
  const el = document.getElementById('section-' + letter);
  if (el) el.scrollIntoView({behavior: 'smooth', block: 'start'});
});

// Add modal
const addModal = document.getElementById('modal');
document.getElementById('fab-btn').addEventListener('click', () => {
  addModal.classList.add('open');
  setTimeout(() => document.getElementById('input-artist').focus(), 300);
});
document.getElementById('cancel-add-btn').addEventListener('click', () => addModal.classList.remove('open'));
addModal.addEventListener('click', e => { if (e.target === addModal) addModal.classList.remove('open'); });

document.getElementById('save-btn').addEventListener('click', () => {
  const artist = document.getElementById('input-artist').value.trim();
  const album = document.getElementById('input-album').value.trim();
  if (!artist || !album) return;
  albums.push({ id: nextId++, artist, album, purchased: false });
  save(albums);
  document.getElementById('input-artist').value = '';
  document.getElementById('input-album').value = '';
  addModal.classList.remove('open');
  render();
});

document.getElementById('input-album').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('save-btn').click();
});

// Export
document.getElementById('export-btn').addEventListener('click', () => {
  const json = JSON.stringify(albums, null, 2);
  const date = new Date().toISOString().slice(0,10);
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(json);
  a.download = `albums-backup-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
});

// Import
document.getElementById('import-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error();
      albums = data;
      nextId = Math.max(0, ...albums.map(a => a.id)) + 1;
      save(albums);
      render();
    } catch {
      alert('קובץ גיבוי לא תקין');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

render();
</script>
</body>
</html>
